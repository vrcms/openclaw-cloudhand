<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CloudHand</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: #e0e0e0;
  background: #1a1a2e;
}
.header {
  padding: 12px 16px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  border-bottom: 1px solid #1a3a6a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.header .version {
  font-size: 11px;
  color: #7a8ba8;
  margin-left: auto;
}
.section {
  padding: 12px 16px;
  border-bottom: 1px solid #2a2a4a;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: #7a8ba8;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.dot.red { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
.dot.yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
.status-label { flex: 1; }
.status-value {
  font-size: 11px;
  color: #9ca3af;
}
.form-group {
  margin-bottom: 10px;
}
.form-group label {
  display: block;
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #2a2a4a;
  border-radius: 4px;
  background: #0f0f23;
  color: #e0e0e0;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus {
  border-color: #3b82f6;
}
.form-group input::placeholder {
  color: #4a4a6a;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.btn {
  flex: 1;
  padding: 7px 0;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:active { opacity: 0.7; }
.btn-connect {
  background: #3b82f6;
  color: #fff;
}
.btn-disconnect {
  background: #374151;
  color: #d1d5db;
}
.error-msg {
  font-size: 11px;
  color: #ef4444;
  margin-top: 6px;
  display: none;
}
</style>
</head>
<body>
  <div class="header">
    <h1>☁️ CloudHand</h1>
    <span class="version">v2.7.0</span>
  </div>

  <!-- 本地连接状态 -->
  <div class="section">
    <div class="section-title">本地连接</div>
    <div class="status-row">
      <span class="dot" id="localDot"></span>
      <span class="status-label">127.0.0.1</span>
      <span class="status-value" id="localStatus">检测中...</span>
    </div>
    <div class="btn-row" style="margin-top: 6px;">
      <button class="btn btn-connect" id="btnAttach">Attach 当前 Tab</button>
    </div>
  </div>

  <!-- 远程连接 -->
  <div class="section">
    <div class="section-title">远程连接</div>
    <div class="status-row">
      <span class="dot" id="remoteDot"></span>
      <span class="status-label" id="remoteLabel">未配置</span>
      <span class="status-value" id="remoteStatus">未连接</span>
    </div>
    <div class="form-group" style="margin-top: 10px;">
      <label>远程地址</label>
      <input type="text" id="remoteHost" placeholder="例如: 1.2.3.4:9876">
    </div>
    <div class="form-group">
      <label>Token</label>
      <input type="password" id="remoteToken" placeholder="远程服务器的认证 Token">
    </div>
    <div class="btn-row">
      <button class="btn btn-connect" id="btnConnect">连接</button>
      <button class="btn btn-disconnect" id="btnDisconnect">断开</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</body>
<script src="popup.js"></script>
</html>
